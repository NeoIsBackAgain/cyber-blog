baseURL = "https://neoisbackagain.github.io/cyber-blog/"
languageCode = 'en-us'
title = 'neoisbackagain'
theme = "PaperMod"
relativeURLs = false
canonifyURLs = true

# ============================================
# OUTPUT FORMATS
# ============================================
[outputs]
  home = ["HTML", "RSS", "JSON"]
  section = ["HTML"]
  taxonomy = ["HTML"]
  term = ["HTML"]

# ============================================
# ASSETS & STYLING
# ============================================
[params.assets]
  css = ["css/extended/custom.css"]

# ============================================
# MAIN PARAMETERS
# ============================================
[params]
  defaultTheme = "dark"
  disableThemeToggle = true
  
  # Show private posts only when explicitly accessed
  showPrivatePosts = false
  
  # --- Fuse.js Search Configuration ---
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 0
    keys = ["title", "tips", "summary", "content"]
  
  # --- Profile Mode ---
  [params.profileMode]
    enabled = true
    title = "NeoIsBackAgain"
    subtitle = "Certified Ethical Hacker | Offensive Security Engineer"
    imageUrl = "https://www.hackthebox.eu/badge/image/YOUR_HTB_ID_HERE" 
    imageTitle = "My Avatar"
    imageWidth = 150
    imageHeight = 150
    
    [[params.profileMode.buttons]]
      name = "HTB Writeups"
      url = "/cyber-blog/htb/"
    
    [[params.profileMode.buttons]]
      name = "About Me"
      url = "/cyber-blog/posts/About_Me_block/"
    
    [[params.profileMode.buttons]]
      name = "GitHub"
      url = "https://github.com/NeolsBackAgain"

# ============================================
# MARKUP & SYNTAX HIGHLIGHTING
# ============================================
[markup]
  [markup.highlight]
    noClasses = false
    style = "monochrome"

# ============================================
# NAVIGATION MENU
# ============================================
[[menu.main]]
  name = "Home"
  url = "/cyber-blog"
  weight = 1

[[menu.main]]
  name = "About Me"
  url = "/cyber-blog/posts/About_Me_block/"
  weight = 10