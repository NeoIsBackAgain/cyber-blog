{{- if and .Params.isPrivate .Params.password -}}
<div class="password-wall" data-correct-password="{{ .Params.password }}" data-post-slug="{{ .File.BaseFileName }}">
  <div class="password-overlay"></div>
  
  <div class="password-container">
    <div class="password-card">
      <!-- Animated Lock Icon -->
      <div class="lock-icon-wrapper">
        <div class="lock-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            <circle cx="12" cy="17" r="1"></circle>
          </svg>
        </div>
      </div>

      <!-- Header -->
      <div class="password-header">
        <h1 class="password-title">Protected Content</h1>
        <p class="password-subtitle">This post is password protected</p>
      </div>

      <!-- Description -->
      <p class="password-description">
        Enter the password below to view the full content.
      </p>

      <!-- Input Group -->
      <div class="password-input-wrapper">
        <div class="input-field-group">
          <input 
            type="password" 
            class="password-input" 
            id="post-password-{{ .File.BaseFileName }}"
            placeholder="Enter password..." 
            autocomplete="off"
            spellcheck="false"
          />
          <button class="password-toggle-btn" onclick="togglePasswordVisibility(this)">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-eye">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-eye-off" style="display: none;">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
          </button>
        </div>
        <div class="password-message" style="display: none;"></div>
      </div>

      <!-- Unlock Button -->
      <button class="password-unlock-btn" onclick="unlockPost(this)">
        <span class="btn-text">Unlock</span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>

      <!-- Hint -->
      <div class="password-hint">
        <p>💡 Need help? Check the post metadata or contact the author.</p>
      </div>
    </div>
  </div>
</div>

<script>
  function togglePasswordVisibility(btn) {
    const input = btn.parentElement.querySelector('.password-input');
    const iconEye = btn.querySelector('.icon-eye');
    const iconEyeOff = btn.querySelector('.icon-eye-off');
    
    if (input.type === 'password') {
      input.type = 'text';
      iconEye.style.display = 'none';
      iconEyeOff.style.display = 'block';
    } else {
      input.type = 'password';
      iconEye.style.display = 'block';
      iconEyeOff.style.display = 'none';
    }
  }

  function unlockPost(button) {
    const wall = button.closest('.password-wall');
    const input = wall.querySelector('.password-input');
    const correctPassword = wall.dataset.correctPassword;
    const slug = wall.dataset.postSlug;
    const message = wall.querySelector('.password-message');

    if (input.value === correctPassword) {
      // Success animation
      button.classList.add('unlocking');
      
      setTimeout(() => {
        sessionStorage.setItem(`post-unlocked-${slug}`, 'true');
        wall.classList.add('unlock-success');
        
        setTimeout(() => {
          wall.style.display = 'none';
          document.querySelector('.post-content')?.classList.add('unlocked');
        }, 500);
      }, 600);
    } else {
      // Error animation
      input.classList.add('shake');
      message.textContent = '❌ Incorrect password. Try again.';
      message.style.display = 'block';
      input.value = '';
      input.focus();
      
      setTimeout(() => {
        input.classList.remove('shake');
      }, 500);
    }
  }

  // Check if already unlocked on page load
  document.addEventListener('DOMContentLoaded', function() {
    const wall = document.querySelector('.password-wall');
    if (wall) {
      const slug = wall.dataset.postSlug;
      if (sessionStorage.getItem(`post-unlocked-${slug}`) === 'true') {
        wall.style.display = 'none';
      }
    }
  });

  // Allow Enter key to unlock
  document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter' && document.activeElement.classList.contains('password-input')) {
      const button = document.activeElement.closest('.password-wall').querySelector('.password-unlock-btn');
      unlockPost(button);
    }
  });
</script>
{{- end -}}
