{{/* 1. Tell Hugo to automatically strip out any backslashes */}}
{{ $cleanText := replace .Inner "\\" "" }}

<div class="custom-tree-window">
    <div class="tree-titlebar">
        <span class="tree-label">&#x1F4C2; Directory Tree</span>
    </div>
    <div class="tree-content" style="max-height: 650px; overflow-y: auto;">
        <pre class="tree-output" id="tree-{{ .Ordinal }}">{{ $cleanText }}</pre>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const tree = document.getElementById("tree-{{ .Ordinal }}");
    if (!tree) return;

    let lines = tree.textContent.split('\n');
    
    // 2. Dictionary of file extensions and their icons
    // You can easily add more here without writing new if/else statements!
    const iconMap = {
        '.py': '🐍',
        '.md': '📝',
        '.ovpn': '🔐',
        '.txt': '📄',
        '.csv': '📊',
        '.html': '🌐',
        '.htm': '🌐',
        '.go': '🐹',
        '.java': '☕',
        '.js': '🟨',
        '.ts': '🟦',
        '.css': '🎨',
        '.json': '📦',
        '.yml': '⚙️',  // Great for Ansible playbooks
        '.yaml': '⚙️',
        '.sh': '🐚',
        '.ps1': '🪟',  // Added for your PowerShell scripts!
        '.exe': '🚀',
        '.png': '🖼️',
        '.jpg': '🖼️'
    };

    let smartTree = lines.map(line => {
        // Find where the tree lines end and the file/folder name begins
        let match = line.match(/^([│├└─\s]*)(.+)$/);
        
        if (match) {
            let branches = match[1];
            let name = match[2].trim();

            // Skip the root directory dot
            if (name === ".") return branches + '📂 ' + name;

            // Default to folder if there is no extension
            let icon = '📁'; 
            
            // 3. Smart Detection using the Dictionary
            if (name.includes('.')) {
                // Extract the extension (e.g., from "main.go", it grabs ".go")
                let ext = name.substring(name.lastIndexOf('.')).toLowerCase();
                
                // Look up the extension in our map. If not found, use a default file icon.
                icon = iconMap[ext] || '📄'; 
            }

            return branches + icon + ' ' + name;
        }
        return line;
    });

    // Write the smart text back into the window
    tree.textContent = smartTree.join('\n');
});
</script>
